<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur des chants YouTube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="audio-editor.css">
</head>
<body>
    <header class="admin-header">
        <h1>🎵 Gestion des chants audio</h1>
        <nav><a href="index.html">← Retour à l'application</a></nav>
    </header>
    <main>
        <section class="load-section">
            <div class="api-key-container" style="margin-bottom: 1.5rem; background: #1e293b; padding: 1rem; border-radius: 8px; display: inline-block;">
                <label for="yt-api-key" style="margin-right: 0.5rem; font-size: 0.9rem;">🔑 Clé API YouTube :</label>
                <input type="password" id="yt-api-key" placeholder="AIzaSy..." class="search-box" style="width: 250px; margin-right: 0.5rem;">
                <button id="save-api-key" class="secondary-btn">Enregistrer</button>
                <p style="font-size: 0.8rem; color: #94a3b8; margin: 0.5rem 0 0 0; max-width: 400px; text-align: left;">Nécessaire pour la recherche de vidéos. Elle sera sauvegardée localement dans votre navigateur.</p>
            </div>
            <br>
            <button id="load-audio-map" class="primary-btn">📂 Charger la liste des chants</button>
            <p id="load-status" class="load-status"></p>
        </section>

        <section id="editor-section" class="hidden-section">
            <div class="toolbar">
                <div id="stats" class="stats"></div>
                <div class="progress-bar"><div id="progress-bar-fill" class="progress-bar-fill"></div></div>
            </div>
            <div class="toolbar">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">Tous</button>
                    <button class="filter-btn" data-filter="missing">❌ Manquants</button>
                    <button class="filter-btn" data-filter="found">✅ Trouvés</button>
                </div>
                <input type="text" id="search-box" placeholder="🔍 Rechercher un chant…" class="search-box">
            </div>
            <table id="chants-table">
                <thead>
                    <tr>
                        <th class="col-page">Page</th>
                        <th class="col-title">Titre</th>
                        <th class="col-status">Statut</th>
                        <th class="col-action">Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section class="export-section hidden-section" id="export-section">
            <div id="save-indicator" class="save-indicator">⚠️ Modifications non sauvegardées</div>
            <button id="export-json" class="primary-btn">💾 Télécharger audio‑map.js</button>
            <p class="export-help">Le fichier téléchargé remplace <code>public/audio-map.js</code></p>
        </section>
    </main>
    <script src="audio-editor.js"></script>
</body>
</html>
