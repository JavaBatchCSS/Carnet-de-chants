<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur des chants YouTube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="audio-editor.css">
</head>
<body>
    <header class="admin-header">
        <h1>🎵 Gestion des chants audio</h1>
        <nav><a href="index.html">← Retour à l'application</a></nav>
    </header>
    <main>
        <!-- Section configuration des clés -->
        <section class="config-section">
            <details id="config-panel">
                <summary>🔑 Configuration des clés API</summary>
                <div class="config-grid">
                    <div class="config-item">
                        <label for="cfg-yt-key">🎬 Clé API YouTube <span class="optional">(optionnel — fallback Piped si vide)</span></label>
                        <div class="config-input-row">
                            <input type="password" id="cfg-yt-key" placeholder="AIzaSy..." class="config-input">
                            <button class="toggle-vis-btn" data-target="cfg-yt-key" title="Afficher/Masquer">👁</button>
                        </div>
                    </div>
                    <div class="config-item">
                        <label for="cfg-gh-repo">🐙 Dépôt GitHub <span class="optional">(optionnel — fallback téléchargement si vide)</span></label>
                        <input type="text" id="cfg-gh-repo" placeholder="proprietaire/depot" class="config-input">
                    </div>
                    <div class="config-item">
                        <label for="cfg-gh-token">🔐 Token GitHub</label>
                        <div class="config-input-row">
                            <input type="password" id="cfg-gh-token" placeholder="ghp_xxxxxxxxxxxx" class="config-input">
                            <button class="toggle-vis-btn" data-target="cfg-gh-token" title="Afficher/Masquer">👁</button>
                        </div>
                    </div>
                    <div class="config-item">
                        <label for="cfg-gh-path">📁 Chemin du fichier dans le dépôt</label>
                        <input type="text" id="cfg-gh-path" value="public/audio-map.js" class="config-input">
                    </div>
                </div>
                <div style="margin-top: 1rem; display: flex; gap: .5rem; align-items: center;">
                    <button id="save-config" class="primary-btn" style="padding: .5rem 1.2rem;">💾 Sauvegarder la configuration</button>
                    <span id="config-status" style="font-size: .85rem;"></span>
                </div>
            </details>
        </section>

        <section class="load-section">
            <button id="load-audio-map" class="primary-btn">📂 Charger la liste des chants</button>
            <p id="load-status" class="load-status"></p>
        </section>

        <section id="editor-section" class="hidden-section">
            <div class="toolbar">
                <div id="stats" class="stats"></div>
                <div class="progress-bar"><div id="progress-bar-fill" class="progress-bar-fill"></div></div>
            </div>
            <div class="toolbar">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">Tous</button>
                    <button class="filter-btn" data-filter="missing">❌ Manquants</button>
                    <button class="filter-btn" data-filter="found">✅ Trouvés</button>
                </div>
                <input type="text" id="search-box" placeholder="🔍 Rechercher un chant…" class="search-box">
            </div>
            <table id="chants-table">
                <thead>
                    <tr>
                        <th class="col-page">Page</th>
                        <th class="col-title">Titre</th>
                        <th class="col-status">Statut</th>
                        <th class="col-action">Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section class="export-section hidden-section" id="export-section">
            <div id="save-indicator" class="save-indicator">⚠️ Modifications non sauvegardées</div>
            
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button id="export-github" class="primary-btn" style="background: linear-gradient(135deg, #10b981, #059669);">🚀 Pousser sur GitHub</button>
                <button id="export-json" class="secondary-btn">💾 Télécharger (Secours)</button>
            </div>
            <p id="export-status" style="margin-top: 1rem; font-weight: 600;"></p>
            <p class="export-help">Le fichier remplace <code>public/audio-map.js</code></p>
        </section>
    </main>
    <script src="audio-editor.js"></script>
</body>
</html>
