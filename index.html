<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
      /* Use the same side spacing as the search bar and avoid a hard 100px margin.
        Allow horizontal scrolling if tabs overflow so nothing gets hidden. */
      /* Center the nav and give it a limited max width so it floats with side margins */
      .wrap-nav { width: auto !important; padding: 0 1rem !important; margin: 0.35rem auto !important; box-sizing: border-box; }
      .wrap-nav .bar { width: 100% !important; max-width: 1500px !important; margin: 0 auto !important; padding: 0.35rem 0.5rem !important; display: flex; align-items: center; justify-content: space-between; overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* Reduce the space between the tab bar and the search bar */
      .search-bar { margin-top: 0.25rem !important; padding-top: 0.25rem !important; }

      /* Remove side padding on header container so nav reaches edges */
      #global-header { padding-left: 0 !important; padding-right: 0 !important; }

      /* Slightly tighten tab spacing and ensure tabs are visible (scroll if needed) */
      .wrap-nav .bar .tab { margin: 0 0.25rem !important; padding: 0.45rem 0.5rem !important; white-space: nowrap; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="global-header">
        <!-- <h1 class="app-title" style="text-align:center; color:#ffffff; font-family:'Cormorant Garamond', serif; font-weight:800; font-size:3rem; margin:0.2rem 0;">
          <span style="vertical-align:middle;">Carnet de Chants</span>

        <h2 class="app-title" style="text-align:center; color:#ffffff; font-family:'Cormorant Garamond', serif; font-weight:700; font-size:1rem; margin:0.2rem 0;">
          <span style="vertical-align:middle;">Troupe Saint Elme</span>
        </h2> -->
        <!-- Navigation principale -->
        <nav class="wrap-nav" data-current-tab="" aria-label="Navigation principale">

              <a class="tab" data-tab="ecole" href="https://www.saintjosephdescarmes.com/" target="_blank" rel="noopener">

                Site de la Fédération

        <!-- Barre de recherche -->
        <header class="search-bar">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Rechercher un chant ou une page...">
                <button id="search-btn">🔍</button>
            </div>
            <!-- Search Results (hidden by default) -->
            <div id="search-results" class="search-results hidden"></div>
        </header>
    </div>

    

    

    <!-- Modal pour afficher la vidéo YouTube -->
    <div id="youtube-modal" class="youtube-modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close-modal">&times;</span>
            <div id="modal-title" class="modal-title">Titre du chant</div>
            <div id="youtube-iframe-container" class="youtube-iframe-container"></div>
        </div>
    </div>

    <!-- Conteneur principal (scroll-snapping) -->
    <main id="book-container" class="book-container">
        <!-- Le sommaire et les pages seront injectés ici par app.js -->
    </main>

    <!-- Panneau de contrôle flottant -->
    <div id="floating-controls" class="floating-controls hidden-control">
        <div class="controls-current-song">
            <span class="music-icon">🎵</span>
            <span id="current-song-title">Sélectionnez un chant</span>
        </div>
        <div class="controls-buttons">
            <button id="floating-play-btn" class="control-btn-play" title="Écouter le chant actuel">
                <span>▶</span> Écouter
            </button>
            <div class="column-selector">
                <span class="selector-label">Colonnes :</span>
                <button class="col-btn active" data-cols="default">Auto</button>
                <button class="col-btn" data-cols="1">1</button>
                <button class="col-btn" data-cols="2">2</button>
                <button class="col-btn" data-cols="3">3</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
      (function loadFreshAppScripts(){
        const version = Date.now().toString();
        const scripts = [
          'public/audio-map.js',
          'public/songs-index.js',
          'public/pages-index.js',
          'public/page-content.js',
          'app.js'
        ];

        function loadScript(src) {
          return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = `${src}${src.includes('?') ? '&' : '?'}v=${version}`;
            script.onload = resolve;
            script.onerror = () => reject(new Error(`Impossible de charger ${src}`));
            document.body.appendChild(script);
          });
        }

        scripts.reduce((chain, src) => chain.then(() => loadScript(src)), Promise.resolve())
          .catch((error) => {
            console.error(error);
            const book = document.getElementById('book-container');
            if (book) {
              book.innerHTML = '<div style="text-align:center; padding:50px;">Erreur lors du chargement des fichiers de données.</div>';
            }
          });
      })();
    </script>
    <script>
      (function adjustBookOffset(){
        const header = document.getElementById('global-header');
        const book = document.getElementById('book-container');
        if (!header || !book) return;
        function update(){
          const h = Math.ceil(header.getBoundingClientRect().height);
          // add small gap so the title isn't flush against the header
          const gap = 8;
          book.style.paddingTop = (h + gap) + 'px';
          book.style.scrollPaddingTop = (h + gap) + 'px';
        }
        window.addEventListener('resize', update);
        window.addEventListener('load', update);
        document.addEventListener('DOMContentLoaded', update);
        if (window.ResizeObserver) {
          try {
            const ro = new ResizeObserver(update);
            ro.observe(header);
          } catch (e) {
            // ignore if ResizeObserver not available or errors
          }
        }
        update();
      })();
    </script>
</body>
</html>
